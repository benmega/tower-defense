name: Tests and Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports || true

    - name: Format check with black
      run: |
        black --check src/ || true

    - name: Run tests with pytest
      run: |
        pytest src/tests/ -v --cov=src --cov-report=term-missing --cov-report=html --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.10'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Generate coverage badge
      if: matrix.python-version == '3.10'
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/

  code-quality:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Check code style with pylint
      run: |
        pylint src/ --disable=all --enable=E,F --exit-zero || true

    - name: Run pylint report
      run: |
        pylint src/ --output-format=text --exit-zero || true

  summary:
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    if: always()

    steps:
    - name: Check test results
      if: needs.test.result == 'failure'
      run: echo "::error::Tests failed"

    - name: Check code quality results
      if: needs.code-quality.result == 'failure'
      run: echo "::warning::Code quality checks failed"

    - name: All checks passed
      if: needs.test.result == 'success' && needs.code-quality.result == 'success'
      run: echo "✅ All checks passed!"
