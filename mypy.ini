[mypy]
python_version = 3.8
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True
follow_imports = silent
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True

[mypy-pygame.*]
ignore_missing_imports = True

[mypy-pygame_gui.*]
ignore_missing_imports = True

[mypy-src.tests.*]
ignore_errors = True

[mypy-setup]
ignore_errors = True
